name: Keep Render backend awake

on:
  schedule:
    # Render free tier spins down after ~15 min idle — ping every 10 min
    - cron: '*/10 * * * *'
  workflow_dispatch:

env:
  BACKEND_HEALTH_URL: https://nix-backend-bost.onrender.com/health

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping health endpoint
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "Attempt ${attempt}/3 → ${BACKEND_HEALTH_URL}"
            if curl --fail --silent --show-error --max-time 90 "${BACKEND_HEALTH_URL}"; then
              echo ""
              echo "Backend is up."
              exit 0
            fi
            echo "Retry in 30s..."
            sleep 30
          done
          echo "Backend did not respond after 3 attempts."
          exit 1
